/**/docking_server:
  ros__parameters:
    dock_database: ""
    base_frame: "base_link"
    fixed_frame: "map"
    dock_plugins: ["go2"]
    controller_frequency: 20.0
    wait_charge_timeout: 10.0
    # initial_perception_timeout: 5.0
    # dock_approach_timeout: 30.0

    controller:
      k_phi: 1.5 #2.0
      k_delta: 2.0
      beta: 1.5 #1.5
      lambda: 1.5 #1.5
      v_linear_min: 0.1
      v_linear_max: 0.18
      v_angular_max: 0.55 #0.75
      slowdown_radius: 0.50 #0.35
      rotate_to_heading_angular_vel: 0.6 #0.6
      rotate_to_heading_max_angular_accel: 1.0 #2.0
      transform_tolerance: 2.0
      use_collision_detection: false

      # Parâmetros de undocking
      undock_linear_tolerance: 1.0       # Tolerância linear (m) para sair do loop de undocking
      undock_angular_tolerance: 0.7      # ~7 graus - Tolerância angular para parar rotação
      # max_undocking_time: 30.0            # Timeout máximo para undocking (s)

    go2:
      plugin: "opennav_docking::SimpleChargingDock"
      use_battery_status: true
      use_stall_detection: false
      use_external_detection_pose: true
      dock_direction: "forward"
      docking_threshold: 0.03
      staging_x_offset: -1.5
      staging_yaw_offset: 0.0
      external_detection_timeout: 2.5
      external_detection_translation_x: -0.8
      external_detection_translation_y: 0.0
      external_detection_rotation_yaw: 0.0
      charging_threshold: 80.0

  
